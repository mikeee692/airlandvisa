<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Land Process - መመዝገቢያ ፎርም</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between"> 

    <header class="bg-blue-900 text-white py-6 shadow-md text-center">
        <h1 class="text-3xl font-bold tracking-wide"><i class="fa-solid fa-plane-departure mr-2"></i> Air Land Process <i class="fa-solid fa-truck mr-2"></i></h1>
        <p class="text-blue-200 mt-2 text-sm md:text-base">የአየር እና የየብስ ትራንስፖርት/ሎጂስቲክስ ሂደት መመዝገቢያ</p>
    </header> 

    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6"><i class="fa-solid fa-user-plus text-blue-600 mr-2"></i> የመመዝገቢያ ፎርም</h2>
            
            <form action="https://formsubmit.co/mikeee692@gmail.com" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <div>
                    <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-user text-gray-400 mr-1"></i> ሙሉ ስም <span class="text-red-500">*</span></label>
                    <input type="text" name="Full_Name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="የአባት ስም ጨምሮ ያስገቡ">
                </div> 

                <div>
                    <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-phone text-gray-400 mr-1"></i> ስልክ ቁጥር <span class="text-red-500">*</span></label>
                    <input type="tel" name="Phone_Number" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="09... ወይም +251...">
                </div> 

                <div>
                    <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-house text-gray-400 mr-1"></i> የመኖሪያ አድራሻ <span class="text-red-500">*</span></label>
                    <textarea name="Address" rows="2" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ክፍለ ከተማ፣ ወረዳ፣ የቤት ቁጥር..."></textarea>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-layer-group text-gray-400 mr-1"></i> የአገልግሎት አይነት <span class="text-red-500">*</span></label>
                    <select name="Process_Type" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
                        <option value="" disabled selected>እባክዎ አንዱን ይምረጡ</option>
                        <option value="Air Process">የአየር ሂደት (Air Process)</option>
                        <option value="Land Process">የየብስ ሂደት (Land Process)</option>
                    </select>
                </div> 

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-location-dot text-gray-400 mr-1"></i> መነሻ ቦታ</label>
                        <input type="text" name="Origin" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ለምሳሌ፡ አዲስ አበባ">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-map-pin text-gray-400 mr-1"></i> መድረሻ ቦታ</label>
                        <input type="text" name="Destination" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="መድረሻ ከተማ/ሀገር">
                    </div>
                </div> 

                <div>
                    <label class="block text-gray-700 font-medium mb-2"><i class="fa-solid fa-image text-gray-400 mr-1"></i> የጉርድ ፎቶ ይስቀሉ <span class="text-red-500">*</span></label>
                    <input type="file" name="Passport_Photo" accept="image/*" required onchange="previewImage(event)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    
                    <div id="photoPreview" class="mt-3 w-32 h-40 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center text-gray-400 text-xs overflow-hidden bg-gray-50">
                        <span>ፎቶው እዚህ ይታያል</span>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 flex items-center justify-center cursor-pointer">
                        <i class="fa-solid fa-paper-plane mr-2"></i> ለመመዝገብ እዚህ ይጫኑ
                    </button>
                </div>
            </form>
        </div>
    </main> 

    <footer class="bg-gray-800 text-gray-400 py-4 text-center text-sm border-t border-gray-700">
        &copy; 2026 Air Land Process. መብቱ በህግ የተጠበቀ ነው።
    </footer> 

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('photoPreview');
                output.innerHTML = '<img src="' + reader.result + '" class="w-full h-full object-cover" />';
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
